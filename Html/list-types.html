<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lists and Types</title>
  </head>
  <body>
    <a href="index.html">Home</a>
    <div>
      <h1>Ul</h1>
      <ul>
        <li>HTML</li>
        <li>CSS</li>
      </ul>
    </div>
    <div>
      <h1>Ol</h1>
      <ol>
        <li>HTML</li>
        <li>CSS</li>
      </ol>
    </div>
    <div>
      <h1>dl,dt and dd</h1>
      <dl>
        <dt>HTML</dt>
        <dd>Linguagem de marcação.</dd>
        <dt>dt</dt>
        <dd>dd</dd>
      </dl>
    </div>
    <div>
      <h1>Uma lista dentro da outra</h1>
      <ul>
        <li>
          Frutas
          <ul>
            <li>Maçã</li>
          </ul>
        </li>
      </ul>
    </div>
  </body>
</html>
